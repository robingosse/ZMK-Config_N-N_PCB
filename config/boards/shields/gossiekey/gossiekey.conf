# GossieKey shared config

# Split keyboard over UART (TRRS cable)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_SERIAL=y

# ZMK Studio — allows live keymap editing without reflashing
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# BLE (for wireless to host PC)
CONFIG_BT=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Nice-to-haves
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n
CONFIG_ZMK_USB_LOGGING=n
